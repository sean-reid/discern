name = "discern-pipeline"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# All scheduling handled by cron-job.org for simplicity.
# No Cloudflare crons needed.

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "discern-db"
database_id = "a25c2162-ff33-4f2d-b429-e4418f6a4339"

# R2 bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "discern-images"

# Workers AI binding (free tier, no API key needed)
[ai]
binding = "AI"

# Observability
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
