name = "discern-pipeline"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Cron triggers
# 03:00 - Full ingestion (real + AI images)
# 04:00 - Elo recalculation
# 05:00 - Image retirement
# 09:00, 15:00, 21:00 - AI-only generation to maintain balance
[triggers]
crons = ["0 3 * * *", "0 4 * * *", "0 5 * * *", "0 9 * * *", "0 15 * * *", "0 21 * * *"]

# D1 database binding
[[d1_databases]]
binding = "DB"
database_name = "discern-db"
database_id = "a25c2162-ff33-4f2d-b429-e4418f6a4339"

# R2 bucket binding
[[r2_buckets]]
binding = "R2"
bucket_name = "discern-images"

# Workers AI binding (free tier, no API key needed)
[ai]
binding = "AI"

# Environment variables (set real values with `wrangler secret put`)
[vars]
UNSPLASH_ACCESS_KEY = ""
PEXELS_API_KEY = ""
HF_TOKEN = ""
